services:
  - type: web
    name: wps-baixiaosheng
    env: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npx vite build && cd .. && cp -r frontend/dist/* frontend/dist/
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: WPS_SID
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: deepseek
      - key: LLM_MODEL
        value: deepseek-chat
      - key: LLM_API_BASE
        value: https://api.deepseek.com
      - key: AI_DOCS_DRIVE_ID
        value: "2343012230"
      - key: ACH_TOKEN
        sync: false
